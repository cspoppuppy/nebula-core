---
- name: "Day 0: Prepare Raspberry Pis for K3s"
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Update apt cache and upgrade
      apt:
        update_cache: yes
        upgrade: dist
      tags: ["update", "maintenance"]

    - name: Set Hostnames
      hostname:
        name: "{{ inventory_hostname }}"
      tags: ["config"]

    - name: Disable Swap (Required for K8s)
      command: dphys-swapfile swapoff
      ignore_errors: yes
      tags: ["config"]

    - name: Uninstall Swap
      command: dphys-swapfile uninstall
      ignore_errors: yes
      tags: ["config"]

    - name: Enable cgroups for K3s (cmdline.txt)
      lineinfile:
        path: /boot/firmware/cmdline.txt
        backrefs: yes
        regexp: '^((?!.*\bcgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1\b).*)$'
        line: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1'
      notify: Reboot
      tags: ["boot"]

    - name: Install simplified tools (Git, Vim, Curl)
      apt:
        name:
          - git
          - vim
          - curl
          - open-iscsi # Longhorn/storage requirements
          - nfs-common
        state: present
      tags: ["packages"]

  handlers:
    - name: Reboot
      reboot:
