---
- name: Install K3s Master
  hosts: masters
  become: true
  tasks:
    - name: Install K3s Server
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable servicelb" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for node-token
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token

    - name: Read node-token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Fetch kubeconfig to local project directory
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/../k3s.yaml"
        flat: yes

    - name: Update kubeconfig server IP
      delegate_to: localhost
      become: false
      replace:
        path: "{{ playbook_dir }}/../k3s.yaml"
        regexp: '127.0.0.1'
        replace: "{{ ansible_host }}"

- name: Install K3s Workers
  hosts: workers
  become: true
  tasks:
    - name: Install K3s Agent
      shell: >
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['masters'][0]]['ansible_host'] }}:6443 K3S_TOKEN={{ hostvars[groups['masters'][0]]['node_token'].content | b64decode | trim }} sh -
      args:
        creates: /usr/local/bin/k3s-agent
