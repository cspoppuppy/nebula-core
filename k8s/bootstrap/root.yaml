apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/USERNAME/REPO.git"
    targetRevision: HEAD
    path: k8s/apps
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
